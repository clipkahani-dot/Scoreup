<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ScoreUp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="fade-in class-page-body">
    <header class="header">
        <a href="index.html" class="logo" style="text-decoration: none;">ScoreUp</a>
        <div class="search-container">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search for chapters, questions..." autocomplete="off">
                <button type="button" class="clear-btn" id="searchClear" style="display:none;">✕</button>
            </div>
            <div class="search-dropdown" id="searchDropdown" style="display:none;"></div>
        </div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="class10.html">Class 10</a>
            <a href="class12.html">Class 12</a>
        </nav>
        <button class="mobile-menu-btn">☰</button>
    </header>

    <main class="page-container slide-up" style="max-width: 1000px; margin: 0 auto; padding: 3rem 5%;">
        <div class="page-header" style="text-align: left; margin-bottom: 2rem;">
            <h2>Contact Us</h2>
            <p>We are always here to help you</p>
        </div>

        <div class="subject-card" style="max-width: 600px; margin: 0 auto; padding: 3rem 2.5rem; text-align: left; align-items: stretch;">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-dark);">Email Address</label>
                <input type="email" placeholder="student@example.com" style="width: 100%; padding: 1rem; border: 1px solid #d1e3ff; border-radius: 12px; font-size: 1rem; outline: none; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-dark);">Your Message</label>
                <textarea rows="5" placeholder="How can we improve ScoreUp?" style="width: 100%; padding: 1rem; border: 1px solid #d1e3ff; border-radius: 12px; font-size: 1rem; outline: none; font-family: inherit; box-sizing: border-box;"></textarea>
            </div>
            <button class="btn-gradient ripple" style="width: 100%; padding: 1rem; cursor: pointer; border: none; font-size: 1.1rem;">Send Message</button>
        </div>
    </main>

    <footer class="footer" style="margin-top: 4rem;">
        <div class="footer-links">
            <a href="about.html">About ScoreUp</a>
            <a href="contact.html" class="active">Contact Us</a>
            <a href="disclaimer.html">Disclaimer</a>
        </div>
        <p>&copy; 2026 ScoreUp Learning Platform.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
