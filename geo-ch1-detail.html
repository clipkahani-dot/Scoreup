                short: [
{q:"संसाधन को परिभाषित करें।",a:"मानव के उपयोग में आने वाली दुनिया की वे सभी वस्तुएँ, जो उसकी आवश्यकताओं को पूरा करती हैं और जिन्हें बनाने की तकनीक उपलब्ध है, संसाधन कहलाती हैं (जैसे- भूमि, जल, खनिज)। प्रसिद्ध भूगोलविद् जिम्मरमैन ने कहा था— 'संसाधन होते नहीं, बनते हैं।'",y:"15 A I, 19 A I"},
{q:"संसाधन नियोजन से क्या अभिप्राय है?",a:"देश में उपलब्ध संसाधनों की पहचान करना, उनका सही आकलन करना और विवेकपूर्ण ढंग से उनका उचित उपयोग करना ही संसाधन नियोजन कहलाता है।",y:"25 A I"},
{q:"नवीकरणीय संसाधन क्या है? (अथवा, नवीकरणीय ऊर्जा के चार उदाहरण दीजिए।)",a:"वे संसाधन जिन्हें भौतिक, रासायनिक या यांत्रिक प्रक्रियाओं द्वारा बार-बार प्राप्त किया जा सकता है और जो कभी समाप्त नहीं होते, उन्हें नवीकरणीय संसाधन कहते हैं। उदाहरण: सौर ऊर्जा, पवन ऊर्जा, जल और वन।",y:"23 A II"},
{q:"प्राकृतिक संसाधनों का संरक्षण क्यों आवश्यक है?",a:"प्राकृतिक संसाधनों का अविवेकपूर्ण और अति-उपयोग कई सामाजिक, आर्थिक और पर्यावरणीय समस्याएँ (जैसे प्रदूषण, ग्लोबल वार्मिंग) पैदा कर रहा है। भावी (आने वाली) पीढ़ी के लिए इन संसाधनों को बचाए रखने और पृथ्वी का संतुलन बनाए रखने के लिए संसाधनों का संरक्षण अत्यंत आवश्यक है।",y:"17 A II, 19 A II, 24 A I"},
{q:"संसाधन संरक्षण की उपयोगिता (महत्त्व) को लिखिए।",a:"संसाधों का योजनाबद्ध और विवेकपूर्ण उपयोग ही संसाधन संरक्षण कहलाता है। इसकी उपयोगिता यह है कि यह वर्तमान आवश्यकताओं को पूरा करने के साथ-साथ भविष्य की पीढ़ियों के लिए संसाधनों को सुरक्षित रखता है और पर्यावरण को नष्ट होने से बचाता है।",y:"22 A I"},
{q:"खादर और बाँगर में कोई तीन अंतर स्पष्ट कीजिए।",a:"(i) नवीन (नई) जलोढ़ मिट्टी को खादर कहते हैं, जबकि पुरानी जलोढ़ मिट्टी को बाँगर कहते हैं। (ii) खादर मिट्टी के कण महीन (पतले) होते हैं, जबकि बाँगर मिट्टी के कण मोटे होते हैं। (iii) खादर मिट्टी वाले क्षेत्रों में हर साल बाढ़ का पानी पहुँचता है, जबकि बाँगर क्षेत्रों में बाढ़ का पानी नहीं पहुँच पाता है।",y:"12 A"},
{q:"जलोढ़ मृदा की विशेषताओं का एक संक्षिप्त विवरण दें।",a:"जलोढ़ मृदा भारत के विस्तृत क्षेत्रों में फैली सबसे उपजाऊ मिट्टी है। इसमें पोटाश, फास्फोरस और चूना प्रचुर मात्रा में पाया जाता है। यह मिट्टी गहन कृषि के लिए बहुत उपयोगी है और धान, गेहूँ, गन्ना जैसी फसलों के लिए अत्यंत लाभदायक होती है।",y:"24 A II"},
{q:"जलोढ़ मृदा के विस्तार वाले राज्यों के नाम बतावें। इस मृदा में कौन-कौन सी फसलें लगाई जा सकती हैं?",a:"जलोढ़ मिट्टी मुख्य रूप से उत्तर प्रदेश, बिहार, पंजाब, गुजरात, राजस्थान, बंगाल और असम में पाई जाती है। इस अत्यंत उपजाऊ मिट्टी में मुख्य रूप से धान (चावल), गेहूँ, मक्का, गन्ना और दलहन जैसी फसलें उगाई जाती हैं।",y:"18 A I"},
{q:"लेटराइट मृदा की विशेषताएँ बताएँ।",a:"लेटराइट मृदा का निर्माण भारी वर्षा और उच्च तापमान वाले क्षेत्रों में होता है। यह मिट्टी अम्लीय प्रकृति की होती है और इसमें ह्यूमस (जीवांश) की मात्रा कम पाई जाती है। खाद और उर्वरक डालने पर ही इसमें चाय, कॉफी और काजू की खेती की जा सकती है।",y:"24 A I"},
{q:"भारत के किन भागों में नदी डेल्टा का विकास हुआ है? यहाँ की मृदा की क्या विशेषता है?",a:"भारत के पूर्वी तटीय मैदान (महानदी, गोदावरी, कृष्णा और कावेरी नदियों के मुहाने) में नदी डेल्टा का विकास हुआ है। यहाँ मुख्य रूप से उपजाऊ 'जलोढ़ मृदा' पाई जाती है, जिसका निर्माण नदियों द्वारा लाए गए बालू, सिल्ट और गाद के जमाव से होता है।",y:"18 A II"},
{q:"फसल चक्रण मृदा संरक्षण में किस प्रकार सहायक है?",a:"एक ही खेत में लगातार एक ही फसल उगाई से मिट्टी की उर्वरता (पोषक तत्व) नष्ट हो जाती है। इसलिए दो लगातार फसलों के बीच तिलहन या दलहन (दालों) के पौधे लगाने से मिट्टी में नाइट्रोजन का स्थिरीकरण होता है और उसकी खोई हुई उपजाऊ क्षमता वापस आ जाती है। इसे ही फसल चक्रण कहते हैं।",y:"12 C, 20 A I, 21 A I, 22 A I, 23 A II"},
{q:"समोच्च कृषि से आप क्या समझते हैं?",a:"पहाड़ी या पर्वतीय ढलानों पर मिट्टी के कटाव (मृदा अपरदन) को रोकने के लिए ढलान के वृत्ताकार रूप में मेड़ (बंध) बनाकर जो खेती की जाती है, उसे समोच्च कृषि कहते हैं। इससे पानी का बहाव धीमा हो जाता है और मिट्टी सुरक्षित रहती है।",y:"25 A II"},
{q:"मृदा निर्माण के कारकों का उल्लेख करें।",a:"मृदा (मिट्टी) निर्माण एक लंबी और जटिल प्रक्रिया है। इसके निर्माण के प्रमुख कारक हैं— (i) मूल शैल या चट्टान, (ii) उच्चावच या स्थलाकृति, (iii) जलवायु, (iv) वनस्पति, (v) जैव पदार्थ, (vi) खनिज कण, और (vii) समय (अवधि)।",y:"19 C"},
{q:"उद्योगों से प्रदूषण कैसे फैलता है?",a:"उद्योगों की चिमनियों से निकलने वाले धुएँ और हानिकारक गैसों (जैसे कार्बन मोनोऑक्साइड, सल्फर डाइऑक्साइड) से 'वायु प्रदूषण' फैलता है। कारखानों के जहरीले कचरे को सीधे नदियों में बहाने से 'जल प्रदूषण' होता है, तथा भारी मशीनों के शोर से 'ध्वनि प्रदूषण' फैलता है।",y:"19 A I"}
                ],
                long: [
{q:"संसाधन के विकास में 'सतत विकास' की अवधारणा की व्याख्या कीजिए। (अथवा, सतत विकास की अवधारणा की व्याख्या करें।)",a:"संसाधन प्रकृति-प्रदत्त उपहार हैं। इसी अवधारणा के कारण मानव ने प्राकृतिक संसाधनों का अंधाधुंध दोहन किया, जिसके कारण विभिन्न प्रकार की पर्यावरणीय समस्याएँ उत्पन्न हो गयी हैं। संसाधन मानव की जीविका का आधार है। जीवन की गुणवत्ता बनाये रखने के लिए संसाधनों के सतत विकास की अवधारणा अत्यावश्यक है। मानव इस पृथ्वी का सबसे स्वार्थी प्राणी है। स्वार्थी होने के कारण मानव ने संसाधनों का विवेकहीन ढंग से दोहन किया, जिसके कारण विश्व परिस्थितिकी में घोर संकट की स्थिति उत्पन्न हो गई है। संसाधनों का नियोजित उपयोग हो और इससे पर्यावरण को कोई क्षति न पहुँचे, भविष्य की आवश्यकताओं के मद्देनजर वर्तमान विकास को कायम रखा जा सके, ऐसी धारणा सतत विकास कही जाती है।",y:"23 A I"},
{q:"मृदा संरक्षण पर एक निबंध लिखिए। (अथवा, मृदा संरक्षण हेतु कोई दो उपाय बताइए।)",a:"मिट्टी एक महत्त्वपूर्ण संसाधन है। अतः इसका संरक्षण आवश्यक है। मृदा का संरक्षण निम्नलिखित तरीकों को अपनाकर किया जाता है:<br>(i) पर्वतीय क्षेत्रों में कृषि के लिए सीढ़ीदार खेत बनाकर।<br>(ii) खेतों के मेड़ों को मजबूत करके।<br>(iii) खेतों के मेड़ों पर वृक्षारोपण करके।<br>(iv) फसल चक्रीय पद्धति को अपनाकर।<br>(v) पशुओं द्वारा अतिचराई को नियंत्रित करके।<br>(vi) पौधों की रक्षक शृंखला बनाकर।<br>(vii) बालू के टिब्बों को स्थिर करके।<br>(viii) जैविक खादों का प्रयोग करके।<br>इसके अलावा रासायनिक खादों का उचित उपयोग कर मृदा का संरक्षण किया जा सकता है।",y:"25 A I"},
{q:"औद्योगिक प्रदूषण हमारे जीवन को किस प्रकार प्रभावित करता है?",a:"औद्योगिक प्रदूषण आज एक गंभीर समस्या बना गया है। उद्योगों से निकलने वाले धुएँ और गैसों ने वायु को बुरी तरह प्रदूषित किया है। जल प्रदूषण में सबसे अधिक महत्त्वपूर्ण कारक औद्योगिक अपशिष्ट हैं, जिन्हें नदियों में छोड़ा जाता है। उद्योगों से निकलने वाले शोर ने ध्वनि प्रदूषण को काफी बढ़ा दिया है। इन प्रदूषणों के कारण तरह-तरह की बीमारियों के लोग शिकार हो रहे हैं। साँस लेने में तकलीफ, चर्मरोग, रक्त कैंसर, अस्थि कैंसर, हैजा, पेचिस, टाइफाइड, पीलिया, बहरापन, दमा आदि बीमारियों की जड़ ये प्रदूषण ही है। इस प्रकार औद्योगिक प्रदूषण ने हमारे जीवन को बुरी तरह प्रभावित किया है।",y:"19 C"}
                ]
            }

                short: [
                    { q: "जल दुर्लभता (जल संकट) क्या है?", a: "आवश्यकता की तुलना में स्वच्छ और मीढे जल की कमी होना ही जल दुर्लभता या जल संकट कहलाता है। जब लोगों को पीने, खेती करने और अन्य कार्यों के लिए पर्याप्त मात्रा में शुद्ध जल नहीं मिल पाता, तो उस स्थिति को जल दुर्लभता कहा जाता है।" },
                    { q: "जल के प्रमुख स्रोत कौन-कौन से हैं?", a: "पृथ्वी पर जल के मुख्य रूप से चार स्रोत हैं— पहला भूपृष्ठीय जल (नदियाँ, झीलें, तालाब), दूसरा भूमिगत जल (कुएँ, नलकूपों द्वारा निकाला जाने वाला जल), तीसरा वायुमंडलीय जल (जलवाष्प) और चौथा महासागरीय जल (समुद्रों का खारा पानी)।" },
                    { q: "बहुउद्देशीय नदी घाटी परियोजनाएँ किसे कहते हैं?", a: "नदियों पर बड़े-बड़े बाँध बनाकर एक ही समय में कई उद्देश्यों (जैसे— सिंचाई, बिजली उत्पादन, बाढ़ नियंत्रण, मछली पालन और नौकायान) की पूर्ति करने वाली परियोजनाओं को बहुउद्देशीय नदी घाटी परियोजनाएँ कहा जाता है। भाखड़ा-नांगल और दामोदर घाटी परियोजना इसके प्रमुख उदाहरण हैं।" },
                    { q: "देश के बाँधों को 'आधुनिक भारत का मंदिर' किसने और क्यों कहा था?", a: "भारत के प्रथम प्रधानमंत्री पंडित जवाहरलाल नेहरू ने देश के बाँधों और नदी घाटी परियोजनाओं को 'आधुनिक भारत का मंदिर' कहा था। उनका मानना था कि ये परियोजनाएँ कृषि और ग्रामीण अर्थव्यवस्था के साथ-साथ औद्योगीकरण को भी तेज़ी से बढ़ाएंगी और देश को विकास के रास्ते पर ले जाएंगी।" },
                    { q: "वर्षा जल संग्रहण से आप क्या समझते हैं?", a: "वर्षा के जल को व्यर्थ बहने से रोककर उसे छतों, टैंकों, गड्ढों या कुओं में इकट्ठा करना 'वर्षा जल संग्रहण' कहलाता है। इस जल का उपयोग भविष्य में सिंचाई और घरेलू कार्यों के लिए किया जा सकता है। इससे भूमिगत जल का स्तर भी बढ़ता है।" },
                    { q: "नर्मदा बचाओ आंदोलन क्यों शुरू किया गया था?", a: "नर्मदा नदी पर बनाए जा रहे 'सरदार सरोवर बाँध' के कारण हज़ारों स्थानीय आदिवासियों और किसानों की ज़मीन और घर डूबने वाले थे। उन्हीं विस्थापित लोगों को न्याय दिलाने, उनके पुनर्वास की माँग करने और पर्यावरण को बचाने के लिए मेधा पाटकर के नेतृत्व में 'नर्मदा बचाओ आंदोलन' शुरू किया गया था।" },
                    { q: "भूमिगत जल (भौम जल) किसे कहते हैं?", a: "वर्षा का जो जल रिसकर ज़मीन के अंदर चला जाता है और चट्टानों की परतों के बीच जमा हो जाता है, उसे भूमिगत जल कहते हैं। इसे कुओं, हैंडपंपों और नलकूपों के माध्यम से बाहर निकालकर पीने और सिंचाई के लिए उपयोग किया जाता है।" },
                    { q: "खादीन और जोहड़ क्या हैं?", a: "राजस्थान के सूखे और कम वर्षा वाले क्षेत्रों में वर्षा जल को इकट्ठा करने के लिए बनाए गए पारंपरिक गड्ढों या तालाबों को खादीन और जोहड़ कहा जाता है। इनके निर्माण से वर्षा का पानी ज़मीन में रिस जाता है, जिससे मिट्टी में नमी बनी रहती है और खेती करना संभव हो पाता है।" },
                    { q: "जल प्रदूषण के प्रमुख कारण क्या हैं?", a: "जल प्रदूषण के प्रमुख कारण हैं— कारखानों से निकलने वाला ज़हरीला रासायनिक कचरा सीधे नदियों में बहाना, शहरों का गंदा पानी और सीवर का जलस्रोतों में मिलना, तथा कृषि में कीटनाशकों और रासायनिक खादों का अत्यधिक उपयोग जो बारिश के पानी के साथ मिलकर नदियों और तालाबों में पहुँच जाता है।" },
                    { q: "अंतरराज्यीय जल विवाद से आप क्या समझते हैं?", a: "जब कोई नदी दो या दो से अधिक राज्यों से होकर बहती है, तो उस नदी के जल के बँटवारे और उपयोग को लेकर उन राज्यों के बीच जो आपसी मतभेद या झगड़ा होता है, उसे अंतरराज्यीय जल विवाद कहते हैं। जैसे— कर्नाटक और तमिलनाडु के बीच कावेरी जल विवाद।" }
                ],
                long: [
                    { q: "जल संरक्षण और प्रबंधन की आवश्यकता क्यों है? इसके प्रमुख उपाय बताएँ।", a: "जल जीवन का आधार है, लेकिन पृथ्वी पर पीने योग्य मीठा जल बहुत ही सीमित मात्रा में (केवल 2.5 प्रतिशत) उपलब्ध है। बढ़ती जनसंख्या, औद्योगीकरण, शहरीकरण और कृषि में पानी के अंधाधुंध उपयोग के कारण आज पूरी दुनिया भयंकर जल संकट का सामना कर रही है। जल स्तर लगातार नीचे जा रहा है और नदियाँ सूख रही हैं। इसलिए भविष्य की पीढ़ियों को बचाने और पर्यावरण का संतुलन बनाए रखने के लिए जल संरक्षण और प्रबंधन अत्यंत आवश्यक है।<br><br><strong>जल संरक्षण के प्रमुख उपाय:</strong><br>पहला, वर्षा जल का संग्रहण करना चाहिए। हर घर की छत पर ऐसा सिस्टम होना चाहिए जिससे बारिश का पानी ज़मीन के अंदर या टैंकों में जमा हो सके।<br>दूसरा, सिंचाई के लिए ड्रिप या स्प्रिंकलर (फव्वारा) जैसी आधुनिक और कम पानी सोखने वाली तकनीकों का उपयोग करना चाहिए।<br>तीसरा, कल-कारखानों से निकलने वाले गंदे पानी को बिना साफ किए नदियों में गिरने से रोकना चाहिए।<br>चौथा, अधिक से अधिक पेड़ लगाने चाहिए क्योंकि वन वर्षा लाने और जल को ज़मीन के अंदर रोकने में बहुत मदद करते हैं। इन उपायों से ही जल संकट को टाला जा सकता है।" },
                    { q: "बहुउद्देशीय नदी घाटी परियोजनाओं के क्या लाभ और हानियाँ हैं? विस्तार से वर्णन करें।", a: "नदियों पर बड़े बाँध बनाकर शुरू की गई बहुउद्देशीय परियोजनाओं से देश को कई बड़े लाभ हुए हैं, लेकिन इनके कुछ गंभीर नुकसान (हानियाँ) भी सामने आए हैं।<br><br><strong>लाभ:</strong> इन परियोजनाओं का सबसे बड़ा लाभ यह है कि इनसे बड़े पैमाने पर सस्ती जल-विद्युत (बिजली) का उत्पादन होता है, जो उद्योगों और घरों के लिए आवश्यक है। बाँध बनाकर नदियों के फालतू पानी को रोका जाता है, जिससे भयानक बाढ़ पर नियंत्रण पाया जाता है। इसके अलावा, नहरें निकालकर सूखे क्षेत्रों में साल भर सिंचाई की सुविधा उपलब्ध कराई जाती है और इन जलाशयों में मछली पालन भी किया जाता है।<br><br><strong>हानियाँ:</strong> इन विशाल परियोजनाओं के कुछ बड़े नुकसान भी हैं। बाँध बनाने से हज़ारों हेक्टेयर उपजाऊ ज़मीन और घने जंगल पानी में डूबकर नष्ट हो जाते हैं। उस क्षेत्र में रहने वाले लाखों किसानों और आदिवासियों को अपना घर-बार छोड़कर विस्थापित होना पड़ता है, जिससे उनके सामने आजीविका का संकट खड़ा हो जाता है। इसके अलावा, नदियों का प्राकृतिक बहाव रुकने से जलीय जीवों का जीवन खतरे में पड़ जाता है और भूकंप आने का खतरा भी बढ़ जाता है।" },
                    { q: "वर्षा जल संग्रहण की विभिन्न पारंपरिक और आधुनिक विधियों का वर्णन करें।", a: "प्राचीन काल से ही भारत में जल संरक्षण की एक बहुत ही समृद्ध परंपरा रही है। लोग स्थानीय पर्यावरण और परिस्थितियों के अनुसार वर्षा जल को इकट्ठा करने के लिए कई पारंपरिक विधियों का उपयोग करते थे।<br><br><strong>पारंपरिक विधियाँ:</strong> पहाड़ी क्षेत्रों में लोग नदियों की धारा को मोड़कर खेतों तक पानी ले जाने के लिए 'गुल' या 'कुल' नामक छोटी नहरें बनाते थे। राजस्थान के सूखे इलाकों में पीने का पानी इकट्ठा करने के लिए घरों के आंगनों में गहरे भूमिगत टैंक (टांका) बनाए जाते थे। इसके अलावा कृषि क्षेत्रों में बारिश का पानी रोकने के लिए 'खादीन' और 'जोहड़' जैसे बड़े गड्ढे बनाए जाते थे, ताकि मिट्टी की नमी बनी रहे।<br><br><strong>आधुनिक विधियाँ:</strong> आज के समय में 'छत वर्षा जल संग्रहण' (Rooftop Rainwater Harvesting) सबसे आधुनिक और कारगर विधि है। इसमें मकानों की छतों पर गिरने वाले बारिश के पानी को पीवीसी पाइपों के माध्यम से ज़मीन के नीचे बने टैंक या कुओं में पहुँचाया जाता है। इससे न केवल घरेलू पानी की ज़रूरत पूरी होती है, बल्कि तेज़ी से गिरते हुए भूमिगत जल स्तर (भौम जल) को भी फिर से ऊपर लाने में बहुत मदद मिलती है।" }
                ]
            },
            pyq: {
                short: [
{q:"जल संसाधन के क्या उपयोग हैं?",a:"भारत एक कृषि प्रधान देश है, इसलिए जल का मुख्य उपयोग खेतों की 'सिंचाई' के लिए किया जाता है। इसके अतिरिक्त जल का उपयोग पीने (पेयजल), घरेलू कार्यों, कारखानों, पनबिजली (जलविद्युत) उत्पादन, परमाणु संयंत्रों को ठंडा करने, और मत्स्य पालन (मछली पालन) में किया जाता है।",y:"17 A I, 19 A I, 19 C"},
{q:"नदी घाटी परियोजना के विकास के क्या उद्देश्य हैं?",a:"नदी घाटी परियोजनाओं (बाँधों) के विकास के मुख्य उद्देश्य हैं— बाढ़ को रोकना (नियंत्रण), कृषि के लिए सिंचाई की व्यवस्था करना, जल-विद्युत (बिजली) का उत्पादन करना, मत्स्य पालन, और पर्यावरण का संरक्षण करना।",y:"20 A II"},
{q:"नदीघाटी परियोजनाओं को बहुउद्देशीय क्यों कहा जाता है?",a:"जब नदियों पर बाँध बनाकर एक ही समय में कई उद्देश्यों (जैसे— बाढ़ नियंत्रण, सिंचाई, बिजली उत्पादन, मछली पालन, जल यातायात और पर्यटन) की पूर्ति एक साथ की जाती है, तो ऐसी परियोजनाओं को 'बहुउद्देशीय नदी घाटी परियोजना' कहा जाता है।",y:"11 C"},
{q:"नदी घाटी परियोजना के लाभों का उल्लेख करें।",a:"नदी घाटी परियोजनाओं के प्रमुख लाभ निम्नलिखित हैं: (i) कृषि के लिए नियमित सिंचाई की सुविधा मिलना, (ii) पनबिजली (विद्युत) का उत्पादन होना, (iii) भयंकर बाढ़ पर नियंत्रण पाना, और (iv) उद्योगों तथा घरेलू कार्यों के लिए जलापूर्ति होना।",y:"21 A II"},
{q:"निम्नलिखित नदी घाटी परियोजनाएं किन-किन राज्यों में अवस्थित हैं: हीराकुड, तुंगभद्रा एवं रिहन्द।",a:"(i) हीराकुड परियोजना - उड़ीसा (महानदी पर)। (ii) तुंगभद्रा परियोजना - कर्नाटक (तुंगभद्रा नदी पर)। (iii) रिहन्द परियोजना - उत्तर प्रदेश (रिहन्द नदी पर)।",y:"16 A I"},
{q:"भारत की नदियों के प्रदूषण के कारणों का वर्णन कीजिए।",a:"भारत की अधिकांश नदियाँ वर्तमान में बुरी तरह प्रदूषित हो गई हैं। इसके मुख्य कारण हैं— शहरों के गंदे नालों का पानी सीधे नदियों में गिरना, औद्योगिक कारखानों का जहरीला रासायनिक कचरा नदी में बहाना, कृषि में उपयोग होने वाले कीटनाशकों का नदी तक पहुँचना, और नदियों में कूड़ा तथा मृत शरीर फेंकना।",y:"20 A I, 21 A II"}
                ],
                long: [
{q:"वर्षा जल संग्रहण एवं पुनः चक्रण की विधियों का वर्णन कीजिए।",a:"वर्षा जल का संग्रहण भारत के लिए कोई नई बात नहीं है। प्राचीन भारत में वर्षा जल संग्रहण की उत्कृष्ट व्यवस्था थी। पहाड़ी क्षेत्रों में 'गुल' या 'कुल' जैसी वाहिकाएं बनाकर, नदी की धारा का रास्ता बदल कर खेतों की सिंचाई की जाती थी। राजस्थान में पेयजल के लिए वर्षा जल का संग्रहण छत पर किया जाता था। पश्चिम बंगाल में बाढ़ वाले मैदान में सिंचाई के लिए बाढ़ जल वाहिकाएं बनाने का चलन था। सूखे या अर्धसूखे स्थानों पर वर्षा जल के संग्रह के लिए गड्ढे बनाए जाते थे, जिससे जल से जब भी आवश्यकता पड़े सिंचाई की जा सके। ऐसे ही गड्ढों को राजस्थान के जैसलमेर में खादीन तथा अन्य क्षेत्रों में जोहड़ कहा जाता था।",y:"24 A I"}
                ]
            }
        },
        "3": {
            name: "वन एवं वन्य प्राणी संसाधन",
            iq: {
                short: [
                    { q: "वन किसे कहते हैं?", a: "वन उस विशाल क्षेत्र को कहते हैं जहाँ प्राकृतिक रूप से पेड़-पौधे, झाड़ियाँ और घास बड़ी संख्या में उगते हैं और जहाँ मानवीय हस्तक्षेप न के बराबर होता है। यह वन्य जीवों का प्राकृतिक आवास होता है।" },
                    { q: "वनों के पर्यावरण संबंधी महत्व क्या हैं?", a: "वन पर्यावरण का संतुलन बनाए रखने में अहम भूमिका निभाते हैं। ये हवा को शुद्ध करते हैं, वर्षा लाने में मदद करते हैं, मिट्टी के कटाव को रोकते हैं और पृथ्वी के बढ़ते तापमान (ग्लोबल वार्मिंग) को नियंत्रित करते हैं।" },
                    { q: "आरक्षित वन क्या हैं?", a: "आरक्षित वन वे वन हैं जिन्हें इमारती लकड़ी या अन्य मूल्यवान वन उत्पादों को प्राप्त करने के लिए सरकार द्वारा स्थायी रूप से सुरक्षित कर दिया गया है। इन वनों में स्थानीय लोगों को पशु चराने या पेड़ काटने की सख्त मनाही होती है।" },
                    { q: "राष्ट्रीय उद्यान किसे कहते हैं?", a: "राष्ट्रीय उद्यान वह सुरक्षित क्षेत्र है जहाँ वन्य प्राणियों और प्राकृतिक वनस्पतियों को उनके प्राकृतिक वातावरण में पूर्ण संरक्षण प्रदान किया जाता है। यहाँ किसी भी प्रकार की मानवीय गतिविधि या शिकार की अनुमति बिल्कुल नहीं होती।" },
                    { q: "रेड डाटा बुक क्या है?", a: "रेड डाटा बुक एक ऐसी विशेष पुस्तक है जिसमें विश्व की उन सभी दुर्लभ और संकटग्रस्त प्रजातियों (पेड़-पौधे और जीव-जंतुओं) का रिकॉर्ड रखा जाता है, जिनके भविष्य में विलुप्त होने का भारी खतरा है।" },
                    { q: "चिपको आंदोलन क्या था?", a: "चिपको आंदोलन सत्तर के दशक में उत्तराखंड के गढ़वाल हिमालय क्षेत्र में शुरू हुआ एक महान पर्यावरण आंदोलन था। इसमें स्थानीय महिलाओं ने ठेकेदारों द्वारा पेड़ों को कटने से बचाने के लिए पेड़ों से चिपक कर उनकी रक्षा की थी। इसके प्रमुख नेता सुंदरलाल बहुगुणा थे।" },
                    { q: "जैव विविधता से आप क्या समझते हैं?", a: "पृथ्वी पर पाई जाने वाली विभिन्न प्रकार के पेड़-पौधों, जीव-जंतुओं और सूक्ष्म जीवों की अनगिनत प्रजातियों की विविधता और अनेकता को ही जैव विविधता कहा जाता है। यह एक स्वस्थ पारिस्थितिक तंत्र के लिए बहुत आवश्यक है।" },
                    { q: "भारत में वन्य जीवों के कम होने के प्रमुख कारण क्या हैं?", a: "भारत में वन्य जीवों की संख्या घटने के मुख्य कारण हैं— वनों की अंधाधुंध कटाई से उनका प्राकृतिक आवास छिनना, चमड़े और सींगों के लिए जानवरों का अवैध शिकार, बढ़ता प्रदूषण, और कृषि तथा उद्योगों के लिए जंगली ज़मीन का लगातार सिकुड़ना।" },
                    { q: "बाघ परियोजना क्या है?", a: "बाघों की तेजी से घटती संख्या को रोकने और उन्हें हमेशा के लिए विलुप्त होने से बचाने के लिए भारत सरकार ने उन्नीस सौ तिहत्तर ईस्वी में एक विशेष योजना शुरू की थी, जिसे 'बाघ परियोजना' कहा जाता है।" },
                    { q: "अभयारण्य क्या होता है?", a: "अभयारण्य वह सुरक्षित वन क्षेत्र होता है जहाँ मुख्य रूप से वन्य जीवों (पशु-पक्षियों) को सुरक्षित रखा जाता है। राष्ट्रीय उद्यान की तुलना में यहाँ नियम थोड़े कम सख्त होते हैं और कुछ शर्तों के साथ स्थानीय लोगों को लकड़ियाँ बीनने की सीमित छूट होती है।" }
                ],
                long: [
                    { q: "वनों के प्रत्यक्ष और अप्रत्यक्ष लाभों का विस्तार से वर्णन करें।", a: "वन प्रकृति की सबसे अमूल्य देन हैं। इनसे मानव समाज और पर्यावरण को कई महत्वपूर्ण प्रत्यक्ष और अप्रत्यक्ष लाभ प्राप्त होते हैं।<br><br><strong>प्रत्यक्ष लाभ:</strong> वनों से हमें घर और फर्नीचर बनाने के लिए उत्तम इमारती लकड़ी, जलाने के लिए लकड़ियाँ, कागज़ बनाने के लिए कच्चा माल और उद्योगों के लिए रबर, गोंद तथा जड़ी-बूटियाँ प्राप्त होती हैं। ये वन लाखों जंगली जानवरों और स्थानीय आदिवासियों को आश्रय तथा भोजन प्रदान करते हैं। इसके अलावा वन उत्पादों से सरकार को भारी आय भी प्राप्त होती है।<br><br><strong>अप्रत्यक्ष लाभ:</strong> पर्यावरण को संतुलित रखने में वनों का सबसे बड़ा योगदान है। पेड़-पौधे प्रकाश संश्लेषण की क्रिया में हानिकारक कार्बन डाइऑक्साइड गैस को सोख लेते हैं और जीवनदायिनी ऑक्सीजन गैस छोड़ते हैं। वन बादलों को अपनी ओर आकर्षित कर भारी वर्षा कराने में सहायक होते हैं। पेड़ों की मजबूत जड़ें मिट्टी को कसकर बाँध कर रखती हैं, जिससे बाढ़ का खतरा कम होता है और उपजाऊ भूमि का कटाव रुकता है। वन मरुस्थल के विस्तार को भी रोकते हैं।" },
                    { q: "वन और वन्य जीवों के संरक्षण के लिए सरकार और समाज द्वारा किए गए प्रयासों की विवेचना करें।", a: "बढ़ती जनसंख्या और औद्योगीकरण के कारण वन और वन्य जीवों का भारी विनाश हुआ है। इस विनाश को रोकने के लिए सरकार और समाज दोनों ने मिलकर कई महत्वपूर्ण कदम उठाए हैं।<br><br><strong>सरकारी प्रयास:</strong> भारत सरकार ने उन्नीस सौ बहत्तर ईस्वी में 'वन्य जीव संरक्षण अधिनियम' लागू किया, जिसके तहत जंगली जानवरों के शिकार और उनके अंगों के व्यापार पर पूर्ण प्रतिबंध लगा दिया गया। बाघों को बचाने के लिए 'बाघ परियोजना' और हाथियों के लिए 'हाथी परियोजना' जैसी विशेष योजनाएँ चलाई गईं। पूरे देश में वन्य जीवों को सुरक्षित रखने के लिए कई बड़े राष्ट्रीय उद्यान, अभयारण्य और जीवमंडल निचय स्थापित किए गए हैं।<br><br><strong>सामाजिक प्रयास:</strong> वनों को बचाने में आम जनता और स्थानीय समुदायों का भी बहुत बड़ा योगदान रहा है। हिमालय क्षेत्र में चलाया गया 'चिपको आंदोलन' इसका सबसे बड़ा उदाहरण है, जहाँ महिलाओं ने पेड़ों से चिपक कर उन्हें कटने से बचाया था। इसके अलावा 'नर्मदा बचाओ आंदोलन' और कई गैर-सरकारी संगठनों ने भी पर्यावरण संरक्षण के प्रति लोगों में भारी जागरूकता फैलाई है।" },
                    { q: "जैव विविधता क्या है? यह मानव जीवन के लिए क्यों अत्यंत महत्वपूर्ण है?", a: "पृथ्वी पर पाए जाने वाले विभिन्न प्रकार के पेड़-पौधों, जंगली जानवरों, पक्षियों, कीड़े-मकोड़ों और सूक्ष्म जीवों की अनगिनत प्रजातियों के रूप और आकार में पाई जाने वाली भिन्नता को ही 'जैव विविधता' कहा जाता है। भारत दुनिया के सबसे समृद्ध जैव विविधता वाले देशों में से एक है।<br><br><strong>मानव जीवन के लिए महत्व:</strong> जैव विविधता हमारे पारिस्थितिक तंत्र का सबसे महत्वपूर्ण हिस्सा है। पृथ्वी पर मौजूद हर एक जीव और वनस्पति का पर्यावरण में अपना एक विशेष काम है। ये सभी एक-दूसरे पर निर्भर हैं और एक जटिल खाद्य शृंखला बनाते हैं। यदि इनमें से कोई एक प्रजाति भी विलुप्त होती है, तो पूरा पर्यावरण असंतुलित हो जाएगा। मनुष्य अपनी सभी दैनिक आवश्यकताओं (जैसे भोजन, कपड़े, दवाइयाँ और घर बनाने की सामग्री) के लिए प्रत्यक्ष या अप्रत्यक्ष रूप से इसी जैव विविधता पर ही निर्भर है। इसलिए मानव जाति के अस्तित्व को बचाने के लिए इसका संरक्षण अत्यंत आवश्यक है।" }
                ]
            },
            pyq: {
                short: [
{q:"वन के पर्यावरणीय महत्त्व का वर्णन कीजिए। (अथवा, पर्यावरण के लिए वन क्यों महत्त्वपूर्ण है?)",a:"वन (जंगल) पृथ्वी का 'सुरक्षा कवच' हैं। वन पर्यावरण में कार्बन डाइऑक्साइड की मात्रा को सोखकर प्राणदायी ऑक्सीजन गैस छोड़ते हैं, जिससे वायुमंडल शुद्ध होता है। इसके अलावा वन वर्षा कराने में सहायक होते हैं, मिट्टी के कटाव (मृदा अपरदन) को रोकते हैं और वन्य जीवों को प्राकृतिक आवास प्रदान करते हैं।",y:"14 A II, 17 C, 18 A I, 21 A II"},
{q:"मैंग्रोव वन की विशेषताएँ बताएँ।",a:"मैंग्रोव वन मुख्य रूप से समुद्र के खारे पानी (तटीय क्षेत्रों) में पनपते हैं। इन पेड़ों की जड़ें आपस में गुँथी हुई होती हैं जो तटीय क्षेत्रों को समुद्री तूफानों और चक्रवातों से बचाती हैं। ऑक्सीजन के लिए इनकी कुछ जड़ें जमीन से ऊपर निकल आती हैं। भारत में सुंदरवन इसका सबसे बड़ा उदाहरण है।",y:"24 A II"},
{q:"पर्णपाती वनों के किन्हीं चार वृक्षों के नाम लिखिए।",a:"पर्णपाती वन (जो साल में एक बार अपने पत्ते गिरा देते हैं) के प्रमुख चार वृक्ष हैं— साल, सागवान, नीम और शीशम (तथा पीपल)।",y:"22 A II"},
{q:"बिहार में वन सम्पदा की वर्तमान स्थिति का वर्णन कीजिए।",a:"बिहार विभाजन (झारखंड के अलग होने) के बाद बिहार में वन क्षेत्र बहुत कम हो गया है। वर्तमान में बिहार के कुल भौगोलिक क्षेत्रफल के मात्र 7.1% भाग पर ही वनों का विस्तार बचा है। यह मुख्य रूप से चंपारण, बाँका, जमुई, मुंगेर, नवादा, नालंदा, रोहतास और कैमूर जिलों तक ही सीमित है।",y:"16 A I"},
{q:"भारत में वन सम्पदा की वृद्धि के उपायों का उल्लेख करें।",a:"भारत में वन संपदा बढ़ाने के प्रमुख उपाय हैं— (i) वनों की अंधाधुंध कटाई पर सख्त रोक लगाना। (ii) खाली बंजर भूमि और सड़कों के किनारे बड़े पैमाने पर पेड़ (वृक्षारोपण) लगाना। (iii) वनों को आग लगने से बचाना। (iv) आम जनता और स्थानीय समुदायों को वन संरक्षण कार्यक्रमों में शामिल करना।",y:"24 A I"},
{q:"चिपको आंदोलन क्या है?",a:"चिपको आंदोलन 1972 ई. में उत्तराखंड (तत्कालीन उत्तर प्रदेश) के गढ़वाल क्षेत्र में सुंदरलाल बहुगुणा के नेतृत्व में शुरू हुआ था। जब ठेकेदारों द्वारा हरे पेड़ों की अंधाधुंध कटाई की जा रही थी, तो वहाँ के स्थानीय लोगों (विशेषकर महिलाओं) ने पेड़ों से चिपक कर (गले लगाकर) उन्हें कटने से बचाया था।",y:"15 A II, 17 A I, 18 A II"},
{q:"जैव अभयारण्य क्या है?",a:"जैव अभयारण्य प्राकृतिक रूप से आरक्षित वह वन क्षेत्र है जहाँ वन्य जीवों और वनस्पतियों को पूर्ण सुरक्षा और संरक्षण प्रदान किया जाता है। यहाँ शिकार करना, पेड़ों को काटना या जानवरों को किसी भी प्रकार का नुकसान पहुँचाना सख्त मना होता है।",y:"22 C"},
{q:"वन-जीवों के ह्रास के चार प्रमुख कारकों का उल्लेख कीजिए।",a:"वन्य जीवों की संख्या में तेजी से हो रही कमी के चार मुख्य कारण हैं— (i) जंगलों की कटाई के कारण उनके प्राकृतिक आवास (घरों) का नष्ट होना, (ii) शिकारियों द्वारा खाल, दाँत और सींग के लिए उनका अवैध शिकार करना, (iii) बढ़ते हुए प्रदूषण (जल और वायु प्रदूषण) का प्रभाव, और (iv) जंगलों में भयंकर आग लगना (दावानल)।",y:"19 A I, 20 A I, 22 C, 21 A II"}
                ],
                long: [
{q:"वन एवं वन्य-जीवों के महत्त्व का विस्तार से वर्णन कीजिए। (अथवा, वनों के पर्यावरणीय महत्त्व पर टिप्पणी लिखें।)",a:"वन एवं वन्य-जीवन मानव जीवन के प्रमुख हमसफर हैं। वन उस बड़े भू-भाग को कहते हैं जो पेड़-पौधों और झाड़ियों द्वारा आच्छादित होते हैं। वन जैव विविधताओं का आवास हैं। ये केवल एक संसाधन ही नहीं बल्कि पारिस्थितिकी तंत्र के निर्माता और महत्त्वपूर्ण घटक हैं। हमारा इनसे अटूट संबंध है। वन प्रकृति का एक अमूल्य धरोहर है। वन एवं वन्य-प्राणी मानव के लिए प्रतिस्थापित होने वाले संसाधन हैं। ये इस जीवन-मंडल में सभी जीवों को संतुलित स्थिति में जीने के लिए पारिस्थितिकी तंत्र के निर्माण में सर्वाधिक योगदान देते हैं, क्योंकि सभी के लिए खाद्य ऊर्जा का प्रारंभिक स्रोत वनस्पति होता है। वस्तुतः हमें वन और वन्य-जीव संसाधनों को संरक्षण देना चाहिए।",y:"25 A II"},
{q:"जैव-विविधता क्या है? यह मानव के लिए क्यों महत्त्वपूर्ण है?",a:"जैव विविधता (Biodiversity)—जैव विविधता शब्द का उपयोग पृथ्वी पर पाए जानेवाले सभी पौधों, जंतुओं तथा सूक्ष्मजीवियों की विविधता के लिए किया जाता है। वास्तव में पृथ्वी पर अनेक प्रकार के पौधे, जंतु तथा सूक्ष्मजीव पाए जाते हैं। इनमें पाई जाने वाली विविधता को ही जैव विविधता कहते हैं। हमारा देश जैव विविधता में समृद्ध देश है। <br>मानव के लिए जैव विविधता की उपयोगिता—जैव विविधता हमारे लिए जीवन, औषधियाँ, भेषज्य दवाईयों, रेशों, रबर और लकड़ियों का साधन है। कई सूक्ष्म जीवों का उपयोग बहुमूल्य उत्पाद तैयार करने के लिए उद्योग में प्रयोग होता है। जैव विविधता का उपयोग बहुत सारे औषधीय उपयोग में होता है। मानव के भोजन पूर्णतः जैविक संसार से प्राप्त होता है। इस प्रकार हम कह सकते हैं कि जैव विविधता मानव के लिए बहुत महत्त्वपूर्ण एवं उपयोगी है।",y:"19 A I, 21 A I, 25 A II"},
{q:"किस प्रकार मानवीय क्रियाएँ वनस्पति एवं जीव-जन्तुओं के ह्रास के लिए उत्तरदायी हैं?",a:"वनस्पति एवं जीव जन्तुओं के ह्रास के लिए तीन उत्तरदायी मानवीय क्रियाएँ इस प्रकार हैं— <br>(i) प्राकृतिक आवासों का अतिक्रमण—वन्य जीवों के प्राकृतिक आवास जंगल, मैदानी क्षेत्र, नदियाँ, तालाब, वेट लैंड, पहाड़ी एवं तराई आदि हैं। जनसंख्या में हो रही अनियंत्रित वृद्धि, औद्योगिक विकास, शहरीकरण, बड़े बाँध या अन्य परियोजनाएँ इनके आवास की अतिक्रमण कर रही हैं। <br>(ii) प्रदूषण जनित समस्या—बढ़ते प्रदूषणों ने कई समस्याओं को जन्म दिया है। इनमें वन्य जीवों की संख्या में कमी के प्रमुख कारक पराबैंगनी किरणें, अम्लवर्षा और हरित गृहप्रभाव हैं। <br>(iii) आर्थिक लाभ—रंग-बिरंगी तितलियों से लेकर मेढ़कों, पक्षियों और जंगली जानवरों, कछुआ, तोता एवं अन्य स्थानीय परिंदों का अवैध शिकार कर इन्हें बेचा जाता है।",y:"21 A II"}
                ]
            }
        },
        "4": {
            name: "खनिज संसाधन",
            iq: {
                short: [
                    { q: "खनिज किसे कहते हैं?", a: "पृथ्वी के अंदर से खुदाई करके निकाले जाने वाले वे प्राकृतिक पदार्थ, जिनकी एक निश्चित रासायनिक संरचना और विशिष्ट आंतरिक बनावट होती है, खनिज कहलाते हैं। लोहा, ताँबा, सोना और अभ्रक खनिजों के प्रमुख उदाहरण हैं।" },
                    { q: "अयस्क (Ore) से आप क्या समझते हैं?", a: "पृथ्वी की परत से निकाले गए वे प्राकृतिक चट्टानी पदार्थ जिनमें धातुएँ प्रचुर मात्रा में पाई जाती हैं और जिनसे आसानी से तथा कम खर्च में धातुएँ प्राप्त की जा सकती हैं, उन्हें अयस्क कहा जाता है। जैसे बॉक्साइट, जिससे एल्युमीनियम निकाला जाता है।" },
                    { q: "धात्विक और अधात्विक खनिज में मुख्य अंतर क्या है?", a: "धात्विक खनिजों को गलाने पर धातु प्राप्त होती है और इनमें चमक होती है (जैसे— लोहा, ताँबा, सोना)। इसके विपरीत, अधात्विक खनिजों को गलाने पर धातु प्राप्त नहीं होती और इनमें धातुओं जैसी चमक नहीं होती (जैसे— अभ्रक, चूना पत्थर, कोयला)।" },
                    { q: "लौह और अलौह खनिज क्या हैं?", a: "जिन धात्विक खनिजों में लोहे का अंश (मात्रा) पाया जाता है, उन्हें लौह खनिज कहते हैं (जैसे— लौह अयस्क, मैंगनीज, निकेल)। जिन धात्विक खनिजों में लोहे का अंश बिल्कुल नहीं होता, उन्हें अलौह खनिज कहते हैं (जैसे— सोना, चाँदी, सीसा, बॉक्साइट)।" },
                    { q: "मैंगनीज के प्रमुख उपयोग क्या हैं?", a: "मैंगनीज एक अत्यंत उपयोगी खनिज है। इसका सबसे अधिक उपयोग इस्पात (कठोर लोहा) बनाने में किया जाता है। इसके अलावा इसका उपयोग ब्लीचिंग पाउडर, कीटनाशक दवाइयाँ, सूखी बैटरी और चमड़ा उद्योग में भी भारी मात्रा में किया जाता है।" },
                    { q: "भारत में लौह अयस्क के प्रमुख प्रकार कौन-कौन से हैं?", a: "भारत में मुख्य रूप से चार प्रकार के लौह अयस्क पाए जाते हैं— पहला मैग्नेटाइट (सबसे उत्तम कोटि का), दूसरा हेमेटाइट (जिसका सर्वाधिक उपयोग होता है), तीसरा लिमोनाइट और चौथा सिडेराइट (सबसे निम्न कोटि का लौह अयस्क)।" },
                    { q: "बॉक्साइट किस धातु का अयस्क है और इसका मुख्य उपयोग क्या है?", a: "बॉक्साइट एल्युमीनियम धातु का प्रमुख अयस्क है। एल्युमीनियम बहुत हल्की, मजबूत और जंग-रोधी धातु होती है, इसलिए इसका उपयोग मुख्य रूप से हवाई जहाज़ बनाने, बिजली के तार बनाने और बर्तन बनाने में किया जाता है।" },
                    { q: "अभ्रक का उपयोग विद्युत उद्योगों में क्यों किया जाता है?", a: "अभ्रक विद्युत का बहुत बड़ा कुचालक (जिसमें करंट नहीं बहता) होता है और यह अत्यधिक गर्मी भी सह सकता है। इसी विशेषता के कारण इसका उपयोग बिजली के उपकरणों, जैसे इस्त्री, हीटर और रेडियो बनाने में भारी मात्रा में किया जाता है।" },
                    { q: "चूना पत्थर (Limestone) का आर्थिक महत्व क्या है?", a: "चूना पत्थर एक बहुत ही महत्वपूर्ण अधात्विक खनिज है। इसका पचहत्तर प्रतिशत से अधिक उपयोग सीमेंट उद्योग में कच्चे माल के रूप में किया जाता है। इसके अलावा लोहा गलाने और रसायन उद्योगों में भी इसकी भारी आवश्यकता होती है।" },
                    { q: "रत्नागिरी लौह अयस्क क्षेत्र भारत के किस राज्य में स्थित है?", a: "रत्नागिरी लौह अयस्क क्षेत्र भारत के पश्चिमी तट पर स्थित महाराष्ट्र राज्य में पाया जाता है। यहाँ से निकाले गए उच्च कोटि के लौह अयस्क को मार्मागाओ बंदरगाह के माध्यम से दूसरे देशों में निर्यात किया जाता है।" }
                ],
                long: [
                    { q: "खनिजों के वर्गीकरण का विस्तार से वर्णन करें।", a: "खनिजों को उनकी प्रकृति और विशेषताओं के आधार पर मुख्य रूप से दो बड़े भागों में बाँटा गया है— धात्विक खनिज और अधात्विक खनिज।<br><br><strong>1. धात्विक खनिज:</strong> ये वे खनिज हैं जिनसे धातु प्राप्त होती है। इन्हें पुनः दो भागों में बाँटा जाता है। लौह युक्त खनिज, जिनमें लोहे का अंश होता है, जैसे मैंगनीज, निकेल और कोबाल्ट। दूसरे अलौह खनिज, जिनमें लोहे का अंश नहीं होता, जैसे ताँबा, जस्ता, सोना और एल्युमीनियम।<br><strong>2. अधात्विक खनिज:</strong> इन खनिजों में कोई धातु नहीं पाई जाती। इन्हें भी दो भागों में वर्गीकृत किया गया है। कार्बनिक खनिज, जिनमें जीवाश्म (जीवों के अंश) होते हैं, जैसे कोयला और पेट्रोलियम। दूसरे अकार्बनिक खनिज, जिनमें जीवाश्म बिल्कुल नहीं होते, जैसे अभ्रक, चूना पत्थर और ग्रेफाइट। इसी वर्गीकरण के आधार पर खनिजों का खनन और औद्योगिक उपयोग किया जाता है।" },
                    { q: "भारत में लौह अयस्क के उत्पादन और उसके वितरण पर प्रकाश डालें।", a: "भारत लौह अयस्क के भंडार और उत्पादन के मामले में विश्व के सबसे धनी देशों में से एक है। यहाँ मुख्य रूप से हेमेटाइट और मैग्नेटाइट प्रकार का उच्च कोटि का लौह अयस्क पाया जाता है, जिसकी विदेशों में भारी माँग है।<br><br>भारत में लौह अयस्क का वितरण मुख्य रूप से चार बड़ी पट्टियों (क्षेत्रों) में है।<br><strong>1. ओडिशा-झारखंड पेटी:</strong> जहाँ देश का सबसे उत्तम हेमेटाइट अयस्क मिलता है।<br><strong>2. दुर्ग-बस्तर-चंद्रपुर पेटी:</strong> जो छत्तीसगढ़ और महाराष्ट्र में फैली है; यहाँ से अयस्क जापान को निर्यात किया जाता है।<br><strong>3. बेल्लारी-चित्रदुर्ग-चिकमगलूर-तुमकुर पेटी:</strong> जो कर्नाटक में स्थित है और यहाँ कुद्रेमुख की प्रसिद्ध खदानें हैं।<br><strong>4. महाराष्ट्र-गोवा पेटी:</strong> जहाँ का लोहा थोड़ा कमज़ोर होता है लेकिन निर्यात के लिए महत्वपूर्ण है। इन खदानों से देश की अर्थव्यवस्था को भारी बल मिलता है।" },
                    { q: "खनिजों का संरक्षण क्यों आवश्यक है? इसके संरक्षण के प्रमुख उपाय बताएँ।", a: "खनिज प्रकृति की अत्यंत मूल्यवान देन हैं। पृथ्वी पर खनिजों का भंडार बहुत सीमित है और ये अनवीकरणीय संसाधन हैं, अर्थात् एक बार समाप्त होने के बाद इन्हें दोबारा बनने में लाखों वर्ष लग जाते हैं। वर्तमान समय में औद्योगिक विकास के कारण खनिजों का अंधाधुंध और तेज़ी से दोहन हो रहा है। यदि ऐसा ही चलता रहा, तो भविष्य की पीढ़ियों के लिए कुछ नहीं बचेगा और पूरे विश्व का विकास रुक जाएगा। इसलिए खनिजों का संरक्षण अत्यंत आवश्यक है।<br><br><strong>संरक्षण के प्रमुख उपाय:</strong><br>पहला, खनिजों का उपयोग बहुत ही योजनाबद्ध और विवेकपूर्ण तरीके से होना चाहिए। बर्बादी को तुरंत रोका जाना चाहिए।<br>दूसरा, धातुओं का पुनर्चक्रण (रीसाइक्लिंग) करना चाहिए; पुराने लोहे या ताँबे को पिघलाकर दोबारा उपयोग में लाना चाहिए।<br>तीसरा, खनिजों के नए और सस्ते विकल्पों की खोज करनी चाहिए, जैसे धातुओं की जगह प्लास्टिक या लकड़ी का उपयोग बढ़ाना चाहिए।" }
                ]
            },
            pyq: {
                short: [
{q:"खनिज क्या है?",a:"खनिज प्रकृति में पाया जाने वाला वह भौतिक और रासायनिक पदार्थ है जिसकी एक निश्चित आंतरिक संरचना और रासायनिक संघटन होता है। ये सामान्यतः चट्टानों की दरारों और परतों में पाए जाते हैं (जैसे— लोहा, कोयला, अभ्रक)।",y:"21 A II"},
{q:"धात्विक और अधात्विक खनिज में अंतर स्पष्ट करें।",a:"धात्विक खनिज वे होते हैं जिन्हें गलाने पर धातु प्राप्त होती है और वे कठोर तथा चमकीले होते हैं (जैसे— लोहा, ताँबा, मैंगनीज)। इसके विपरीत, अधात्विक खनिजों को गलाने पर धातु प्राप्त नहीं होती है और ये प्रायः पीटने पर टूट जाते हैं (जैसे— अभ्रक, कोयला, चूना पत्थर)।",y:"13 C, 19 A I"},
{q:"कार्बनिक खनिज से आप क्या समझते हैं?",a:"कार्बनिक खनिज वे खनिज हैं जिनका निर्माण जीवों और वनस्पतियों (पेड़-पौधों) के लाखों वर्षों तक पृथ्वी के अंदर दबे रहने और उनके अपघटन से होता है। चूँकि इनमें जीवाश्म (Carbon) पाया जाता है, इसलिए इन्हें कार्बनिक खनिज कहते हैं (जैसे— कोयला और पेट्रोलियम)।",y:"25 A I"},
{q:"लौह अयस्क के प्रकारों के नाम लिखिए।",a:"लौह अयस्क (Iron Ore) मुख्य रूप से चार प्रकार के होते हैं: (i) हेमेटाइट (Haematite), (ii) मैग्नेटाइट (Magnetite), (iii) लिमोनाइट (Limonite), और (iv) सिडेराइट (Siderite)।",y:"12 C, 22 C"},
{q:"मैंगनीज के उपयोग पर प्रकाश डालिए।",a:"मैंगनीज एक अत्यंत उपयोगी खनिज है जिसका मुख्य उपयोग इस्पात (Steel) बनाने में होता है। इसके अतिरिक्त इसका उपयोग शुष्क बैटरी (Dry cells), फोटोग्राफी, चमड़ा और माचिस उद्योग में, तथा ब्लीचिंग पाउडर और कीटनाशक दवाइयाँ बनाने में किया जाता है।",y:"12 A, 24 A II"},
{q:"खनिजों की मुख्य विशेषताओं का उल्लेख कीजिए।",a:"खनिजों की सबसे बड़ी विशेषता यह है कि ये 'अनवीकरणीय' (समाप्य) संसाधन हैं, अर्थात् एक बार खत्म होने पर इन्हें तुरंत दोबारा नहीं बनाया जा सकता। इनका वितरण पृथ्वी पर असमान है। ये आधुनिक औद्योगिक क्रांति की रीढ़ हैं, क्योंकि खेती के उपकरण से लेकर बड़े कारखानों तक का निर्माण खनिजों से ही होता है।",y:"23 A II, 25 A II"},
{q:"खनिजों के संरक्षण एवं प्रबंधन से क्या समझते हैं?",a:"खनिज अनवीकरणीय संसाधन हैं। यदि इनका इसी तरह अंधाधुंध और अति-दोहन होता रहा, तो ये भविष्य में पूरी तरह समाप्त हो जाएँगे। अतः खनिजों की बर्बादी को रोककर, नई तकनीक से उनका न्यायपूर्ण और मितव्ययी (कम से कम) उपयोग करना ही खनिजों का संरक्षण और प्रबंधन कहलाता है।",y:"15 A II, 18 A II, 20 A I, 25 A II"}
                ],
                long: [
{q:"अर्थव्यवस्था पर खनन-कार्य के प्रभावों का वर्णन करें।",a:"खनिजों का हमारे जीवन में बड़ा महत्त्व है। खनिज हमारे लिए बहुत उपयोगी हैं। खनिजों की खोज के बाद लोगों ने इनके गुणों का पता लगाया। गुणों के आधार पर लोगों ने इन्हें उपयोग में लाने की बात सोची। आज लोहा, ताँबा, सोना, चाँदी आदि बहुवाले खनिजों की खुदाई कर आवश्यक समान बनाए जा रहे हैं। खनन कार्य के द्वारा कोयला, लौह अयस्क, एल्युमिनियम अयस्क, ताँबा अयस्क आदि बहुत से अयस्कों से विभिन्न खनिज बनाए जाते हैं। खनिजों जैसे लोहा, ताँबा, ऐल्युमिनियम आदि का उपयोग आज हमारी जरूरत है। आज देश में लोहा उत्पादन के कई कारखानें स्थापित हैं जिनसे लाखों लोगों की आजीविका चलती है। भारतीय अर्थव्यवस्था में इन खनिजों या खनन-कार्यों का बहुत महत्त्व है।",y:"19 A II"}
                ]
            }
        },
        "5": {
            name: "शक्ति संसाधन",
            iq: {
                short: [
                    { q: "शक्ति (ऊर्जा) संसाधन किसे कहते हैं?", a: "वे प्राकृतिक संसाधन जिनका उपयोग मशीनों को चलाने, यातायात के साधनों, कृषि और उद्योगों में ऊर्जा (ताकत) प्राप्त करने के लिए किया जाता है, शक्ति या ऊर्जा संसाधन कहलाते हैं। कोयला, पेट्रोलियम और सूर्य का प्रकाश इसके प्रमुख उदाहरण हैं।" },
                    { q: "ऊर्जा के परंपरागत और गैर-परंपरागत स्रोतों में क्या अंतर है?", a: "परंपरागत स्रोत वे हैं जिनका उपयोग मनुष्य सदियों से कर रहा है और जो सीमित हैं तथा एक दिन समाप्त हो जाएंगे (जैसे कोयला, पेट्रोलियम)। इसके विपरीत, गैर-परंपरागत स्रोत वे हैं जिनका उपयोग नई तकनीक से शुरू हुआ है और वे कभी समाप्त नहीं होंगे (जैसे सौर ऊर्जा, पवन ऊर्जा)।" },
                    { q: "कोयले के प्रमुख प्रकार कौन-कौन से हैं?", a: "कार्बन की मात्रा और गुणवत्ता के आधार पर कोयले को मुख्य रूप से चार प्रकारों में बाँटा गया है— पहला एंथ्रेसाइट (सबसे उत्तम कोटि का), दूसरा बिटुमिनस (भारत में सर्वाधिक उपयोग होने वाला), तीसरा लिग्नाइट (भूरा कोयला) और चौथा पीट (सबसे निम्न कोटि का कोयला)।" },
                    { q: "पेट्रोलियम का आर्थिक महत्व क्या है?", a: "पेट्रोलियम आधुनिक औद्योगिक और यातायात व्यवस्था की रीढ़ है। इससे न केवल पेट्रोल और डीज़ल प्राप्त होता है, बल्कि मिट्टी का तेल, स्नेहक, कीटनाशक दवाइयाँ, कृत्रिम रबर और प्लास्टिक भी बनाए जाते हैं। इसके इतने अधिक महत्व के कारण ही इसे 'तरल सोना' भी कहा जाता है।" },
                    { q: "भारत में जल-विद्युत का विकास क्यों महत्वपूर्ण है?", a: "जल-विद्युत बहते हुए पानी (नदियों या बाँधों) से बनाई जाती है। यह ऊर्जा का एक नवीकरणीय, सस्ता और बिल्कुल प्रदूषण-मुक्त स्रोत है। भारत में नदियों का एक विशाल जाल बिछा हुआ है, इसलिए यहाँ स्वच्छ बिजली उत्पादन के लिए जल-विद्युत का विकास बहुत महत्वपूर्ण है।" },
                    { q: "सौर ऊर्जा का उत्पादन कैसे होता है?", a: "जब सूर्य की तेज़ किरणों (धूप) को विशेष रूप से बनाए गए फोटोवोल्टाइक सेलों पर डाला जाता है, तो वे सेल सूर्य की उस गर्मी और प्रकाश को सीधे विद्युत ऊर्जा (बिजली) में बदल देते हैं। इसे ही सौर ऊर्जा कहा जाता है। भारत जैसे गर्म देश में इसकी अपार संभावनाएँ हैं।" },
                    { q: "पवन ऊर्जा क्या है और भारत में इसके लिए कौन-से राज्य अनुकूल हैं?", a: "तेज़ बहती हुई हवा (पवन) की ताकत से बड़ी-बड़ी चक्कियों (टरबाइन) को चलाकर जो बिजली पैदा की जाती है, उसे पवन ऊर्जा कहते हैं। भारत में इसके विकास के लिए गुजरात, राजस्थान, महाराष्ट्र और तमिलनाडु जैसे तटीय और खुले राज्य सबसे अधिक अनुकूल हैं।" },
                    { q: "परमाणु (नाभिकीय) ऊर्जा कैसे प्राप्त की जाती है?", a: "यूरेनियम और थोरियम जैसे भारी रेडियोधर्मी खनिजों के परमाणुओं को विशेष परमाणु रिएक्टरों में विखंडित (तोड़ने) करने से जो अपार गर्मी निकलती है, उससे पानी को भाप में बदलकर टरबाइन चलाया जाता है। इसी प्रक्रिया से परमाणु ऊर्जा प्राप्त की जाती है।" },
                    { q: "बायोगैस क्या है?", a: "गाँवों में जानवरों के गोबर, कृषि के बेकार कचरे, झाड़ियों और मानव मल को एक बड़े गड्ढे में सड़ाकर जो ज्वलनशील गैस तैयार की जाती है, उसे बायोगैस कहते हैं। यह ग्रामीण क्षेत्रों में खाना पकाने और रोशनी करने के लिए एक बहुत ही उत्तम और सस्ता ईंधन है।" },
                    { q: "गोंडवाना समूह का कोयला क्या है और यह कहाँ पाया जाता है?", a: "भारत में पाए जाने वाले कुल कोयले का लगभग छियानवे प्रतिशत भाग गोंडवाना समूह का है। यह कोयला लगभग बीस करोड़ वर्ष पुराना और बहुत उच्च गुणवत्ता वाला है। यह मुख्य रूप से झारखंड, पश्चिम बंगाल, ओडिशा और छत्तीसगढ़ राज्यों की नदी घाटियों में पाया जाता है।" }
                ],
                long: [
                    { q: "कोयले के वर्गीकरण और भारत में इसके वितरण का विस्तार से वर्णन करें।", a: "कोयला भारत का सबसे महत्वपूर्ण और प्रमुख ऊर्जा संसाधन है। देश के औद्योगिक विकास में इसकी भूमिका सबसे बड़ी है। कार्बन की मात्रा के आधार पर कोयले को चार भागों में वर्गीकृत किया गया है: 1. एंथ्रेसाइट: यह सबसे उच्च कोटि का कोयला है जिसमें नब्बे प्रतिशत से अधिक कार्बन होता है और यह जलने पर धुआँ नहीं देता। 2. बिटुमिनस: इसमें साठ से अस्सी प्रतिशत कार्बन होता है और भारत में सबसे अधिक इसी का उपयोग होता है। 3. लिग्नाइट: इसे भूरा कोयला भी कहते हैं, इसमें नमी अधिक होती है। 4. पीट: यह दलदली भागों में मिलता है और सबसे घटिया किस्म का कोयला है।<br><br>भारत में कोयले का वितरण मुख्य रूप से दो भूगर्भीय कालों में बँटा है— गोंडवाना समूह और टर्शियरी समूह। देश का छियानवे प्रतिशत कोयला गोंडवाना समूह में मिलता है, जो मुख्य रूप से झारखंड (झरिया, बोकारो), पश्चिम बंगाल (रानीगंज), ओडिशा और छत्तीसगढ़ की नदी घाटियों में स्थित है। टर्शियरी समूह का कोयला नया है और यह असम, अरुणाचल प्रदेश तथा मेघालय जैसे पूर्वोत्तर राज्यों में पाया जाता है।" },
                    { q: "ऊर्जा के गैर-परंपरागत स्रोतों का वर्णन करें और भविष्य में इनका क्या महत्व है?", a: "ऊर्जा के जिन स्रोतों का उपयोग मनुष्य ने हाल ही की आधुनिक तकनीक के माध्यम से शुरू किया है और जो पृथ्वी पर कभी समाप्त नहीं होंगे, उन्हें गैर-परंपरागत या नवीकरणीय ऊर्जा स्रोत कहा जाता है। इसके अंतर्गत सौर ऊर्जा, पवन ऊर्जा, जल-विद्युत, बायोगैस, भूतापीय ऊर्जा और ज्वारीय ऊर्जा आते हैं।<br><br>सौर ऊर्जा सूर्य की किरणों से फोटोवोल्टाइक सेलों द्वारा प्राप्त की जाती है। पवन ऊर्जा में तेज़ हवाओं से टरबाइन चलाकर बिजली बनाई जाती है, जिसके लिए भारत के तटीय राज्य बहुत अनुकूल हैं। इसी प्रकार ग्रामीण क्षेत्रों में जैविक कचरे और गोबर से बायोगैस तैयार की जाती है जो घरेलू कार्यों के काम आती है।<br><br><strong>भविष्य में इनका महत्व:</strong> वर्तमान में दुनिया कोयले और पेट्रोलियम जैसे परंपरागत स्रोतों पर अत्यधिक निर्भर है, जो बहुत तेज़ी से समाप्त हो रहे हैं और भयंकर प्रदूषण भी फैला रहे हैं। भविष्य के इस ऊर्जा संकट और ग्लोबल वार्मिंग जैसी महामारियों से बचने के लिए ये गैर-परंपरागत स्रोत ही एकमात्र विकल्प हैं। ये पर्यावरण के अनुकूल (प्रदूषण-मुक्त) हैं और मुफ्त में उपलब्ध हैं, इसलिए भविष्य का पूरा आर्थिक विकास इन्हीं पर निर्भर करेगा।" },
                    { q: "ऊर्जा संसाधनों के संरक्षण की आवश्यकता क्यों है? इसके संरक्षण के प्रमुख उपाय बताएँ।", a: "ऊर्जा संसाधन किसी भी देश के आर्थिक विकास (कृषि, उद्योग और परिवहन) की रीढ़ होते हैं। वर्तमान समय में हमारी अधिकांश ऊर्जा ज़रूरतें कोयला, पेट्रोलियम और प्राकृतिक गैस जैसे अनवीकरणीय स्रोतों से पूरी होती हैं। पृथ्वी पर इनके भंडार बहुत सीमित हैं और हमारी बढ़ती जनसंख्या तथा अंधाधुंध उपयोग के कारण ये अत्यंत तेज़ी से खत्म हो रहे हैं। यदि हमने इन्हें नहीं बचाया, तो भविष्य में पूरी दुनिया अंधकार में डूब जाएगी और विकास का पहिया हमेशा के लिए रुक जाएगा। इसलिए ऊर्जा संसाधनों का संरक्षण अत्यंत आवश्यक है।<br><br><strong>ऊर्जा संरक्षण के प्रमुख उपाय:</strong> पहला, हमें ऊर्जा का उपयोग बहुत ही योजनाबद्ध और किफायती तरीके से करना चाहिए। अनावश्यक रूप से बिजली के उपकरण चालू नहीं छोड़ने चाहिए। दूसरा, व्यक्तिगत वाहनों (कार, बाइक) के स्थान पर सार्वजनिक परिवहन (बस, ट्रेन) का अधिक उपयोग करना चाहिए ताकि पेट्रोल और डीज़ल की बचत हो सके। तीसरा, ऊर्जा की बचत करने वाले आधुनिक उपकरणों (जैसे एलईडी बल्ब) का प्रयोग करना चाहिए। चौथा और सबसे महत्वपूर्ण उपाय यह है कि हमें कोयले और पेट्रोल पर अपनी निर्भरता कम करके सौर ऊर्जा और पवन ऊर्जा जैसे गैर-परंपरागत स्रोतों का अधिक से अधिक उपयोग करना चाहिए।" }

    }

    var params = new URLSearchParams(window.location.search);
    var topicId = params.get('topic') || '1';
    var data = geoData[topicId];

    if (data) {
        document.getElementById('topic-title').textContent = data.name;
        document.getElementById('topic-crumb').textContent = data.name;
        document.title = data.name + ' - ScoreUp';

        renderSL(data.iq, 'iq-content', false);
        renderSL(data.pyq, 'pyq-content', true);

        // Accordion click
        document.querySelectorAll('.accordion-header').forEach(function(header) {
            header.onclick = function() {
                var item = this.parentElement;
                var wasActive = item.classList.contains('active');
                var section = item.closest('.content-section');
                section.querySelectorAll('.accordion-item').forEach(function(o) { o.classList.remove('active'); });
                if (!wasActive) item.classList.add('active');
            };
        });
    }
    </script>
</body>
</html>
